
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBD Luck Tracker</title>
    <style>
        body {
            background: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        select, button {
            padding: 12px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        select {
            background: #333;
            color: white;
            width: 80%;
        }

        .btn-track {
            background: #e91e63;
            color: white;
            cursor: pointer;
            font-weight: bold;
            width: 80%;
        }

        .stats {
            margin-top: 30px;
            text-align: left;
            background: #252525;
            padding: 15px;
            border-radius: 8px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding: 8px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DBD Luck Tracker</h1>

        <label for="killer-select">Tueur rencontré :</label><br>
        <select id="killer-select">
            <!-- Original Killers -->
            <option value="The Trapper">The Trapper</option>
            <option value="The Wraith">The Wraith (DongDong)</option>
            <option value="The Hillbilly">The Hillbilly</option>
            <option value="The Nurse">The Nurse</option>
            <option value="The Hag">The Hag</option>
            <option value="The Doctor">The Doctor</option>
            <option value="The Huntress">The Huntress</option>
            <option value="The Clown">The Clown</option>
            <option value="The Spirit">The Spirit</option>
            <option value="The Legion">The Legion</option>
            <option value="The Plague">The Plague(Puking Lady)</option>
            <option value="The Oni">The Oni</option>
            <option value="The Deathslinger">The Deathslinger</option>
            <option value="The Blight">The Blight(Fonceur de mur)</option>
            <option value="The Twins">The Twins</option>
            <option value="The Trickster">The Trickster(Couteaux)</option>
            <option value="The Artist">The Artist(Mouettes)</option>
            <option value="The Dredge">The Dredge(Casier)</option>
            <option value="The Knight">The Knight</option>
            <option value="The Skull Merchant">The Skull Merchant(Drones)</option>
            <option value="The Singularity">The Singularity(Robot)</option>
            <option value="The Unknown">The Unknown</option>
            <option value="The Houndmaster">The Houndmaster</option>
            <option value="The Krasue">The Krasue</option>

            <!-- Licensed Killers -->
            <option value="The Shape">The Shape (Michael Myers)</option>
            <option value="The Cannibal">The Cannibal (Leatherface)</option>
            <option value="The Nightmare">The Nightmare (Freddy Krueger)</option>
            <option value="The Pig">The Pig</option>
            <option value="The Ghost Face">The Ghost Face</option>
            <option value="The Demogorgon">The Demogorgon</option>
            <option value="The Executioner">The Executioner (Pyramid Head)</option>
            <option value="The Nemesis">The Nemesis(PwiPwi)</option>
            <option value="The Cenobite">The Cenobite (Pinhead)</option>
            <option value="The Onryo">The Onryo (Cercle-TV)</option>
            <option value="The Mastermind">The Mastermind (Wesker)</option>
            <option value="The Xenomorph">The Xenomorph (Alien)</option>
            <option value="The Good Guy">The Good Guy (Chucky)</option>
            <option value="The Lich">The Lich (Vecna-DnD)</option>
            <option value="The Dark Lord">The Dark Lord (Dracula)</option>
            <option value="The Ghoul">The Ghoul (Kaneki - Pieuvre)</option>
            <option value="The Animatronic">The Animatronic (Springtrap - DoorMan)</option>
            <option value="The First">The First (Henry Creel - Stranger Thing)</option>
        </select>

        <div>
            <input type="checkbox" id="check-camp"> <label for="check-camp">Campé ?</label>
            <input type="checkbox" id="check-tunnel"> <label for="check-tunnel">Tunnelé ?</label>
            <input type="checkbox" id="check-slug"> <label for="check-slug">Sluggé ?</label>
            <input type="checkbox" id="check-escaped"> <label for="check-escaped">Echapé ?</label>
            <input type="checkbox" id="check-hatch"> <label for="check-hatch">Trappe ?</label>
            <input type="checkbox" id="check-bot"> <label for="check-bot">Bot ?</label>
            <input type="checkbox" id="check-meanally"> <label for="check-meanally">Méchant Survivant ?</label>
            <input type="checkbox" id="check-nicegame"> <label for="check-nicegame">Partie Plaisante ?</label>
        </div>

        <button class="btn-track" onclick="saveMatch()">Enregistrer la partie</button>

        <div class="stats">
            <h3>Tes Statistiques</h3>
            <div id="display-stats">Chargement...</div>
            <button onclick="clearStats()" style="background: #444; color: #ccc; font-size: 12px;">Réinitialiser</button>
        </div>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('dbdMatches')) || [];

        function saveMatch() {
            const killer = document.getElementById('killer-select').value;
            const camp = document.getElementById('check-camp').checked;
            const tunnel = document.getElementById('check-tunnel').checked;
            const slug = document.getElementById('check-slug').checked;
            const escaped = document.getElementById('check-escaped').checked;
            const hatch = document.getElementById('check-hatch').checked;
            const bot = document.getElementById('check-bot').checked;
            const meanally = document.getElementById('check-meanally').checked;
            const nicegame = document.getElementById('check-nicegame').checked;
            history.push({ killer, camp, tunnel, slug, escaped, hatch, bot, meanally, nicegame });
            localStorage.setItem('dbdMatches', JSON.stringify(history));

            alert("Partie enregistrée !");
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('display-stats');
            if (history.length === 0) {
                display.innerHTML = "Aucune donnée disponible.";
                return;
            }

            let totalCamp = history.filter(m => m.camp).length;
            let totalTunnel = history.filter(m => m.tunnel).length;
            let totalSlug = history.filter(m => m.slug).length;
            let totalEscaped = history.filter(m => m.escaped).length;
            let totalHatch = history.filter(m => m.hatch).length;
            let totalBot = history.filter(m => m.bot).length;
            let totalMeanally = history.filter(m => m.meanally).length;
            let totalNicegame = history.filter(m => m.nicegame).length;
            let statsPerKiller = {};

            // loop on each match to calculate stats per killer
            history.forEach(match => {
                const killerName = match.killer;

                //If the killer is not yet in the stats, initialize it
                if (!statsPerKiller[killerName]) {
                    statsPerKiller[killerName] = { match: 0, camp: 0, tunnel: 0, slug: 0, escaped: 0, hatch: 0, bot: 0, meanally: 0, nicegame: 0 };
                }

                // Increment all counter for this killer
                statsPerKiller[killerName].match++;
                if (match.camp) statsPerKiller[killerName].camp++;
                if (match.tunnel) statsPerKiller[killerName].tunnel++;
                if (match.slug) statsPerKiller[killerName].slug++;
                if (match.escaped) statsPerKiller[killerName].escaped++;
                if (match.hatch) {
                    statsPerKiller[killerName].hatch++;
                    statsPerKiller[killerName].escaped++
                }
                if (match.bot) statsPerKiller[killerName].bot++;
                if (match.meanally) statsPerKiller[killerName].meanally++;
                if (match.nicegame) statsPerKiller[killerName].nicegame++;
            });

            display.innerHTML = `
                                        <div class="stat-item"><span>Matchs totaux :</span> <b>${history.length}</b></div>
                                        <div class="stat-item"><span>Taux de Camp :</span> <b>${((totalCamp / history.length) * 100).toFixed(1)}%</b></div>
                                        <div class="stat-item"><span>Taux de Tunnel :</span> <b>${((totalTunnel / history.length) * 100).toFixed(1)}%</b></div>
                                        <div class="stat-item"><span>Taux de Slug :</span> <b>${((totalSlug / history.length) * 100).toFixed(1)}%</b></div>
                                        <div class="stat-item"><span>Taux de Victoire :</span> <b>${((totalEscaped / history.length) * 100).toFixed(1)}%</b></div>
                                        <div class="stat-item"><span>Taux de Sortie par trappe :</span> <b>${((totalHatch / history.length) * 100).toFixed(1)}%</b></div>
                                        <div class="stat-item"><span>Taux de Bot :</span> <b>${((totalBot / history.length) * 100).toFixed(1)}%</b></div>
                                        <div class="stat-item"><span>Taux de Méchant survivant :</span> <b>${((totalMeanally / history.length) * 100).toFixed(1)}%</b></div>
                                        <div class="stat-item"><span>Taux de Partie plaisante :</span> <b>${((totalNicegame / history.length) * 100).toFixed(1)}%</b></div>
                                    `;

            let htmlKillerStats = "<h4>Stats par Tueur :</h4>";
            // sort killers by number of match
            const sortedKillers = Object.entries(statsPerKiller).sort((a, b) => b[1].match - a[1].match);

            sortedKillers.forEach(([killerName, data]) => {
                let percentCamp = ((data.camp / data.match) * 100).toFixed(0);
                let percentTunnel = ((data.tunnel / data.match) * 100).toFixed(0);
                htmlKillerStats += `
                                            <div class="stat-item" style="flex-direction: column; align-items: flex-start; border-bottom: 1px solid #444; padding: 10px 0;">
                                                <div style="font-weight: bold; color: #e91e63;">${killerName} (${data.match} fois)</div>
                                                <div style="font-size: 13px; color: #bbb;">
                                                    Camp : ${percentCamp}% | Tunnel : ${percentTunnel}% | 
                                                    Slug : ${((data.slug / data.match) * 100).toFixed(0)}% | 
                                                    Victoire : ${((data.escaped / data.match) * 100).toFixed(0)}% | 
                                                    Trappe : ${((data.hatch / data.match) * 100).toFixed(0)}% | 
                                                    Bot : ${((data.bot / data.match) * 100).toFixed(0)}% | 
                                                    Méchant survivant : ${((data.meanally / data.match) * 100).toFixed(0)}% | 
                                                    Partie plaisante : ${((data.nicegame / data.match) * 100).toFixed(0)}%
                                                </div>
                                            </div>
                                    `;
            });

            display.innerHTML += htmlKillerStats;
        }

        function clearStats() {
            if (confirm("Effacer toutes tes données ?")) {
                localStorage.clear();
                history = [];
                updateDisplay();
            }
        }

        updateDisplay();</script>

</body>
</html>
