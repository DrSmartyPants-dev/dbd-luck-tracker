
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBD Luck Tracker</title>
    <style>
        body {
            background: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        select, button {
            padding: 12px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        select {
            background: #333;
            color: white;
            width: 80%;
        }

        .btn-track {
            background: #e91e63;
            color: white;
            cursor: pointer;
            font-weight: bold;
            width: 80%;
        }

        .stats {
            margin-top: 30px;
            text-align: left;
            background: #252525;
            padding: 15px;
            border-radius: 8px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding: 8px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DBD Luck Tracker</h1>

        <label for="killer-select">Tueur rencontré :</label><br>
        <select id="killer-select">
            <option value="Le Piégeur">Le Piégeur (Trapper)</option>
            <option value="Le Spectre">Le Spectre (Wraith)</option>
            <option value="Le Montagnard">Le Montagnard (Hillbilly)</option>
            <option value="L'Infirmière">L'Infirmière (Nurse)</option>
            <option value="La Harpie">La Harpie (Hag)</option>
            <option value="Le Docteur">Le Docteur (Doctor)</option>
            <option value="La Chasseuse">La Chasseuse (Huntress)</option>
            <option value="Le Clown">Le Clown (Clown)</option>
            <option value="L'Esprit">L'Esprit (Spirit)</option>
            <option value="La Légion">La Légion (Legion)</option>
            <option value="La Peste">La Peste (Plague)</option>
            <option value="L'Oni">L'Oni (Oni)</option>
            <option value="Le Lance-mort">Le Lance-mort (Deathslinger)</option>
            <option value="Le Fléau">Le Fléau (Blight)</option>
            <option value="Les Jumeaux">Les Jumeaux (Twins)</option>
            <option value="Le Farceur">Le Farceur (Trickster)</option>
            <option value="L'Artiste">L'Artiste (Artist)</option>
            <option value="Le Dragage">Le Dragage (Dredge)</option>
            <option value="Le Chevalier">Le Chevalier (Knight)</option>
            <option value="La Marchande de Crânes">La Marchande de Crânes (Skull Merchant)</option>
            <option value="La Singularité">La Singularité (Singularity)</option>
            <option value="L'Inconnu">L'Inconnu (Unknown)</option>
            <option value="La Maîtresse des Chiens">La Maîtresse des Chiens (Houndmaster)</option>
            <option value="Le Krasue">Le Krasue (Krasue)</option>

            <!-- Tueurs Sous Licence -->
            <option value="La Silhouette">La Silhouette (The Shape / Michael Myers)</option>
            <option value="Le Cannibale">Le Cannibale (Cannibal / Leatherface)</option>
            <option value="Le Cauchemar">Le Cauchemar (Nightmare / Freddy Krueger)</option>
            <option value="La Truie">La Truie (Pig / Amanda Young)</option>
            <option value="Ghost Face">Ghost Face (Ghost Face)</option>
            <option value="Le Démogorgon">Le Démogorgon (Demogorgon)</option>
            <option value="L'Exécuteur">L'Exécuteur (Executioner / Pyramid Head)</option>
            <option value="Le Nemesis">Le Nemesis (Nemesis)</option>
            <option value="Le Cénobite">Le Cénobite (Cenobite / Pinhead)</option>
            <option value="L'Onryō">L'Onryō (Onryō / Sadako)</option>
            <option value="Le Mastermind">Le Mastermind (Mastermind / Wesker)</option>
            <option value="Le Xénomorphe">Le Xénomorphe (Xenomorph / Alien)</option>
            <option value="Le Brave Gars">Le Brave Gars (Good Guy / Chucky)</option>
            <option value="La Liche">La Liche (Lich / Vecna)</option>
            <option value="Le Seigneur des Ténèbres">Le Seigneur des Ténèbres (Dark Lord / Dracula)</option>
            <option value="La Goule">La Goule (Ghoul / Kaneki)</option>
            <option value="L'Animatronique">L'Animatronique (Animatronic / Springtrap)</option>
            <option value="Le Premier">Le Premier (The First / Henry Creel)</option>
        </select>

        <div>
            <input type="checkbox" id="check-camp"> <label for="check-camp">Campé ?</label>
            <input type="checkbox" id="check-tunnel"> <label for="check-tunnel">Tunnelé ?</label>
        </div>

        <button class="btn-track" onclick="saveMatch()">Enregistrer la partie</button>

        <div class="stats">
            <h3>Tes Statistiques</h3>
            <div id="display-stats">Chargement...</div>
            <button onclick="clearStats()" style="background: #444; color: #ccc; font-size: 12px;">Réinitialiser</button>
        </div>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('dbdMatches')) || [];

        function saveMatch() {
            const killer = document.getElementById('killer-select').value;
            const camp = document.getElementById('check-camp').checked;
            const tunnel = document.getElementById('check-tunnel').checked;

            history.push({ killer, camp, tunnel });
            localStorage.setItem('dbdMatches', JSON.stringify(history));

            alert("Partie enregistrée !");
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('display-stats');
            if (history.length === 0) {
                display.innerHTML = "Aucune donnée disponible.";
                return;
            }

            let totalCamp = history.filter(m => m.camp).length;
            let totalTunnel = history.filter(m => m.tunnel).length;
            let statsPerKiller = {};

            // loop on each match to calculate stats per killer
            history.forEach(match => {
                const killerName = match.killer;

                //If the killer is not yet in the stats, initialize it
                if (!statsPerKiller[killerName]) {
                    statsPerKiller[killerName] = { match: 0, camp: 0, tunnel: 0 };
                }

                // Increment all counter for this killer
                statsPerKiller[killerName].match++;
                if (match.camp) statsPerKiller[killerName].camp++;
                if (match.tunnel) statsPerKiller[killerName].tunnel++;
            });

            display.innerHTML = `
                                                            <div class="stat-item"><span>Matchs totaux :</span> <b>${history.length}</b></div>
                                                            <div class="stat-item"><span>Taux de Camp :</span> <b>${((totalCamp / history.length) * 100).toFixed(1)}%</b></div>
                                                            <div class="stat-item"><span>Taux de Tunnel :</span> <b>${((totalTunnel / history.length) * 100).toFixed(1)}%</b></div>
                                                        `;

            let htmlKillerStats = "<h4>Stats par Tueur :</h4>";
            // sort killers by number of match
            const sortedKillers = Object.entries(statsPerKiller).sort((a, b) => b[1].match - a[1].match);

            sortedKillers.forEach(([killerName, data]) => {
                let percentCamp = ((data.camp / data.match) * 100).toFixed(0);
                let percentTunnel = ((data.tunnel / data.match) * 100).toFixed(0);
                htmlKillerStats += `
                                <div class="stat-item" style="flex-direction: column; align-items: flex-start; border-bottom: 1px solid #444; padding: 10px 0;">
                                    <div style="font-weight: bold; color: #e91e63;">${killerName} (${data.match} fois)</div>
                                    <div style="font-size: 13px; color: #bbb;">
                                        Camp : ${percentCamp}% | Tunnel : ${percentTunnel}%
                                    </div>
                                </div>
                        `;
            });

            display.innerHTML += htmlKillerStats;
        }

        function clearStats() {
            if (confirm("Effacer toutes tes données ?")) {
                localStorage.clear();
                history = [];
                updateDisplay();
            }
        }

        updateDisplay();</script>

</body>
</html>
